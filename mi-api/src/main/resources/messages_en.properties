# Descriptions
software.premiere.desc=My main video editor where I build my projects block by block, layering effects, transitions, and perfecting color and audio.
software.after.desc=I bring this out whenever I need to create or tweak motion graphics and complex visual effects that go beyond what Premiere can handle.
software.davinci.desc=A highly professional editor I turn to for detailed 4K work, or whenever I need top-tier color grading and stabilization for a video.
software.illustrator.desc=I have a solid grasp of this app, but I don't use it as often since I find other Adobe tools have faster shortcuts for my specific workflow.
software.photoshop.desc=An essential part of my daily grind for any image editing or when I'm crafting high-impact thumbnail designs.
software.encoder.desc=This one is super useful for my workflow; it lets me export different video types with specific formats and settings that Premiere doesn't support directly.
software.filmora.desc=This is actually where I started my journey in the editing world. Even though I now find it limited, it's where it all began for me.
software.capcut.desc=Useful for when Anyone needs speed and agility, though it's not my favorite since I prefer deeper, more personalized editing that capcut-style tools can't reach.

