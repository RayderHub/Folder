<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job de la Vega - Portafolio</title>
    <!-- Fuentes elegantes y minimalistas -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,800;1,600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/portfolio.css}">
</head>
<body>
    <!-- Efecto de transición manga (cortes de pantalla) -->
    <div class="transition-slice top-slice"></div>
    <div class="transition-slice bottom-slice"></div>

    <div class="app-layout">
        
        <!-- Barra lateral (Fragmento) -->
        <div th:replace="~{fragments/fragment-lateralbar :: lateralbar}"></div>

        <!-- Área de contenido principal -->
        <main class="main-content">
            <!-- El controlador inyectará aquí el template correspondiente -->
            <div th:replace="~{${content}}"></div>
        </main>
    </div>

    <!-- Cargar scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script th:src="@{/js/portfolio.js}"></script>
</body>
</html>
