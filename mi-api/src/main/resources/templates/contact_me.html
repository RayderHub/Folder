<!-- Video de fondo -->
<video autoplay muted loop playsinline class="video-background">
    <source th:src="@{/videos/kaneki.mp4}" type="video/mp4">
</video>

<!-- Nueva capa de superposición cinemática -->
<div class="video-overlay"></div>
<section id="view-contact" class="view-panel active">
    <!-- Layout de Contacto -->
    <div class="contact-layout">

        <!-- Cabecera de Sección -->
        <div class="contact-header stagger-enter">
            <h1 class="massive-title" style="font-size: 3.5rem; color: var(--black);">CONTACTO</h1>
            <p class="subtitle">Escríbeme para colaboraciones o consultas.</p>
        </div>

        <!-- Formulario -->
        <form id="contact-form" class="manga-form stagger-enter">
            <div class="form-group">
                <label class="label-manga">NOMBRE COMPLETO</label>
                <input type="text" id="name" name="name" placeholder="¿Cómo te llamas?" required>
            </div>

            <div class="form-group">
                <label class="label-manga">CORREO / TELÉFONO</label>
                <input type="text" id="contact_info" name="contact_info" placeholder="correo@ejemplo.com o +52..."
                    required>
            </div>

            <div class="form-group">
                <label class="label-manga">¿EN QUÉ PUEDO AYUDARTE?</label>
                <textarea id="message" name="message" rows="5" placeholder="Cuéntame tu idea, presupuesto o dudas..."
                    required></textarea>
            </div>

            <button type="submit" id="submit-btn" class="submit-btn-manga">
                ENVIAR MENSAJE <span class="btn-arrow">→</span>
            </button>
        </form>

        <!-- Mensaje de Éxito -->
        <div id="success-message" class="success-manga-box">
            <div class="success-content">
                <h2>¡LOGRADO!</h2>
                <p>Tu mensaje ha sido enviado correctamente. Revisaré mi bandeja pronto.</p>
                <div class="jp-decoration" style="margin-top: 20px;">ありがとうございました</div>
            </div>
        </div>

    </div>
</section>
