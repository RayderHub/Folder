<!-- Video de fondo -->
<video autoplay muted loop playsinline class="video-background">
    <source th:src="@{/videos/kaneki.mp4}" type="video/mp4">
</video>

<!-- Nueva capa de superposición cinemática -->
<div class="video-overlay"></div>
<section id="view-contact" class="view-panel active">
    <!-- Layout de Contacto -->
    <div class="contact-layout">

        <!-- Cabecera de Sección -->
        <div class="contact-header stagger-enter">
            <h1 class="massive-title" style="font-size: 3.5rem; color: var(--black);" th:text="#{contact.title}">CONTACTO</h1>
            <p class="subtitle" th:text="#{contact.subtitle}">Gracias por llegar al final de mi portafolio...</p>
        </div>

        <!-- Formulario -->
        <form id="contact-form" class="manga-form stagger-enter">
            <div class="form-group">
                <label class="label-manga" th:text="#{contact.label.name}">NOMBRE COMPLETO</label>
                <input type="text" id="name" name="name" th:placeholder="#{contact.placeholder.name}" required>
            </div>

            <div class="form-group">
                <label class="label-manga" th:text="#{contact.label.info}">CORREO / TELÉFONO</label>
                <input type="text" id="contact_info" name="contact_info" th:placeholder="#{contact.placeholder.info}"
                    required>
            </div>

            <div class="form-group">
                <label class="label-manga" th:text="#{contact.label.message}">¿EN QUÉ PUEDO AYUDARTE?</label>
                <textarea id="message" name="message" rows="5"
                    th:placeholder="#{contact.placeholder.message}" required></textarea>
            </div>

            <button type="submit" id="submit-btn" class="submit-btn-manga">
                <span th:text="#{contact.btn.send}">ENVIAR MENSAJE</span> <span class="btn-arrow">→</span>
            </button>
        </form>

        <!-- Mensaje de Éxito -->
        <div id="success-message" class="success-manga-box">
            <div class="success-content">
                <h2 th:text="#{contact.success.title}">¡LOGRADO!</h2>
                <p th:text="#{contact.success.text}">Tu mensaje ha sido enviado correctamente...</p>
            </div>
        </div>

    </div>
</section>
