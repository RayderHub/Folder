# Descripciones
software.premiere.desc=Mi editor de video principal con el que trabajo utilizando bloques con diferentes efectos, transiciones, correccion de color, correccion de audio, etc.
software.after.desc=Lo utilizo normalmente si quiero crear o modificar elementos que incluyan movimientos o efectos visuales mas complejos que premiere no dispone.
software.davinci.desc=Es un editor de video muy profesional el cual utilizo si es necesario realizar una edicion de video a detalle, videos en 4k, o necesito una herramienta profesional para la correccion de color o la estabilizacion en un video.
software.illustrator.desc=Tengo un conocimiento moderado para esta aplicacion pero no suelo utilizarlo ya que tiene funciones y atajos mas basicos que otros programas de Adobe.
software.photoshop.desc=Aplicacion que utilizo en mi dia a dia si quiero realizar cualquier edicion de imagen o crear el diseño de una miniatura.
software.encoder.desc=La aplicacion es muy util para exportar diferentes tipos de videos con diferentes formatos y configuraciones no soportadas al exportar directamente en Premiere Pro.
software.filmora.desc=Este editor de video fue con el que empece en el mundo de la edicion, sin embargo, carece o tiene limitantes en herramientas utiles como KeyFrames o correccion de color.
software.capcut.desc=El editor es util si se busca rapidez y agilidad pero no es mi favorito ya que tiene funciones muy basicas y no se puede profundizar en la edicion mas personalizada.

